<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>程序员人格测试 | 看看你是哪款打工人</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="container">
    <!-- 开始页面 -->
    <section id="start-screen" class="screen active">
      <div class="hero">
        <div class="badge">💻 Programmer Persona Test</div>
        <h1 class="title">
          <span class="title-main">程序员人格测试</span>
          <span class="title-sub">看看你是哪款打工人</span>
        </h1>
        <p class="subtitle">
          15道选择题 · 技术30% + 职场70%<br>
          测测你在码农生态链中的真实定位
        </p>
      </div>

      <div class="intro-box">
        <div class="intro-item">
          <span class="emoji">🎯</span>
          <div class="intro-text">
            <h3>测什么？</h3>
            <p>你的技术能力、工作方式、职场心态</p>
          </div>
        </div>
        <div class="intro-item">
          <span class="emoji">📊</span>
          <div class="intro-text">
            <h3>怎么测？</h3>
            <p>19种程序员人格，匹配度最高的就是你</p>
          </div>
        </div>
        <div class="intro-item">
          <span class="emoji">😄</span>
          <div class="intro-text">
            <h3>准不准？</h3>
            <p>仅供娱乐，如有雷同纯属巧合</p>
          </div>
        </div>
      </div>

      <button class="btn btn-start" onclick="startTest()">
        <span>开始测试</span>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="footnote">
        <p>灵感来源：贴吧老哥 + 职场观察 + 阿里职级</p>
      </div>
    </section>

    <!-- 测试页面 -->
    <section id="quiz-screen" class="screen">
      <div class="progress-bar">
        <div class="progress-info">
          <span id="progress-text">第 1 / 15 题</span>
          <span id="answered-text">已答 0 题</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-category" id="question-category">职场生存</div>
        <h2 class="question-text" id="question-text">加载中...</h2>
        <div class="options" id="options"></div>
      </div>

      <div class="nav-buttons">
        <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>上一题</span>
        </button>
        <button class="btn btn-primary" id="result-btn" onclick="showResult()" disabled>
          <span>查看结果</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M16 10C16 13.3137 13.3137 16 10 16C6.68629 16 4 13.3137 4 10C4 6.68629 6.68629 4 10 4C13.3137 4 16 6.68629 16 10Z" stroke="currentColor" stroke-width="2"/>
            <path d="M10 7V10L12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- 结果页面 -->
    <section id="result-screen" class="screen">
      <div class="result-badge">🎉 测试完成</div>
      <div class="result-hero">
        <div class="result-label">你的程序员人格</div>
        <h1 class="result-persona" id="result-persona">加载中...</h1>
        <p class="result-desc" id="result-desc">加载中...</p>
      </div>

      <div class="scores-section">
        <h3 class="scores-title">📊 各项人格匹配度</h3>
        <div id="scores-list" class="scores-list"></div>
      </div>

      <div class="result-actions">
        <button class="btn btn-secondary" onclick="shareResult()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M14 11V14C14 15.1046 13.1046 16 12 16H6C4.89543 16 4 15.1046 4 14V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10 3V11M10 3L7 6M10 3L13 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>分享结果</span>
        </button>
        <button class="btn btn-primary" onclick="restartTest()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10C4 6.68629 6.68629 4 10 4C13.3137 4 16 6.68629 16 10C16 13.3137 13.3137 16 10 16C7.58172 16 5.46869 14.6123 4.5 12.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 14V10H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>重新测试</span>
        </button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
